        description: A CANino é o embrião de um projeto open-hardware, que visa aproximar o setor automotivo ao mundo IOT através de uma interface barata, amigável e pronta para o uso industrial no conceito Hardware in the Loop.
        speaker: Vinicius May
        recording: 
        slides: 
