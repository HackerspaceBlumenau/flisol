    - time: "10:10"
      title: Ubuntu Touch - A liberdade está em suas mãos!
      description: Uma opção livre se opõe às big techs do mundo mobile. Continuando o sonho desenhado pela Canonical, o Ubuntu Touch é um sistema mobile que une a liberdade do software livre com a segurança e liberdade de um sistema convergente.
      speaker: Lucas Bernardes da Silva
      role: Product Owner
      company: WK Sistemas
    - time: "10:30"
      title: Web Scraping com Python na prática
      description: Aprenda um pouco sobre os conceitos de web scraping, realize algumas raspagens em sites conhecidos enquanto aprendemos mais sobre as bibliotecas Python - BeautifulSoup e Scrapy.
      speaker: Leonardo Fiedler
      role: Data Engineer
      company: Senior Sistemas
      type: workshop
    - time: "10:50"
      title: Os desafios e falácias dos projetos de implementação da proteção de dados
      description: Apresentação de questões práticas dos desafios enfrentados no dia a dia dos projetos de implementação da LGPD nas empresas.
      speaker: André Luiz Schneider
      role: 
      company: SSR Advogados
    - time: "12:00"
      title: Almoço
      description: Intervalo para almoço.
      type: break
    - time: "13:10"
      title: Open Source na AWS
      description: Explorando como a AWS usa e fornece soluções de código aberto, esta palestra destaca vantagens e desafios da implementação e uso destas soluções. Ideal para desenvolvedores, arquitetos e engenheiros de infraestrutura interessados no tema.
      speaker: Jonathan André Schweder
      role: System Development Engineer
      company: AWS
    - time: "14:00"
      title: Carreira com Software Livre
      description: O Software Livre está cada vez mais bem-visto, e contribuir com ele ajuda muito a melhorar seu CV. Nesta palestra serão mostrados passos de como iniciar a contribuir e talvez até futuramente trabalhar em uma empresa que cria e mantém projetos de código aberto.
      speaker: Marcos Paulo de Souza
      role: Kernel Livepatch Developer
      company: SUSE
    - time: "14:00"
      title: Flutter na prática
      description: Introdução à conceitos e prática para a criação de aplicativos móveis (Android ou iOS) com o framework Flutter.
      speaker: Fernando Duwe
      role: Analista de Sistemas e Instrutor
      company: ProWay
      type: workshop
    - time: "14:40"
      title: Loc-OS Linux 22
      description: Apresentação do Loc-OS, uma distribuição focada no baixo consumo de recursos.
      speaker: Nicolas Longardi
      role: 
      company: "Loc-OS"
    - time: "15:10"
      title: Café
      description: Intervalo para café, com comes e bebes patrocinado pela Blunix e Edgium.
      type: break
    - time: "15:30"
      title: Do monitoramento a observabilidade
      description: Uma breve introdução ao imenso universo do monitoramento e da observabilidade em sistemas desenvolvidos para internet (SaaS) e suas peculiaridades. Abrangendo conceitos e ferramentas disponíveis no mercado de forma Open Source.
