        speaker: Fabricio Machado
        recording: 
        slides: 
      - time: "11:20"
        title: Franzininho - Open hardware, educação e comunidade
        description: Iremos conversar sobre o projeto Franzininho e como uma iniciativa open hardware da comunidade pode contribuir para educação, desenvolvimento tecnológico e acesso a tecnologia em nosso país.
        speaker: Fábio Souza
        recording: 
        slides: 
