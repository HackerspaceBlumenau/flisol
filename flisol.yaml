        title: A tecnologia e o software livre como suporte à educação em tempos de COVID-19
        description: Em tempos de pandemia, o ensino a distância se tornou essencial, mas também evidenciou diversos problemas. Esta palestra abordará questões sobre como a tecnologia e o software livre podem ajudar a melhorar este cenário.
        speaker: Ricardo Lüders
        recording: 
        slides: 
