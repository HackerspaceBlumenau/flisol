{% extends "base.html" %}

{% block content %}
<div class="mx-auto px-4 sm:px-6 lg:px-8">
  <h2 class="text-2xl text-flisol font-semibold uppercase text-center">
    Galeria de fotos
  </h2>

  <div class="mt-8 text-center">
    <p class="pb-2">Confira as fotos das edições anteriores.</p>
    <div class="lg:flex lg:flex-row lg:space-x-12 lg:justify-center">
      <div class="py-4">
        <img class="m-auto rounded-md border border-solid border-gray-100"
             width="400"
             height="400"
             src="{{ site.photos.cover }}">
      </div>
      <div class="m-auto">
        {% for album in site.photos.albums %}
        <div class="py-4">
          <a href="{{ album.url }}"
             target="_blank"
             class="px-8 py-4 border border-transparent text-base font-medium rounded-md text-white bg-flisol hover:bg-orange-500">
            <span class="text-2xl text-white font-semibold">{{ album.year }}</span>
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
